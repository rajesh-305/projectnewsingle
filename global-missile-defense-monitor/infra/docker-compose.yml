services:
  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    environment:
      - PORT=3000
      - HOST=0.0.0.0
      - NODE_OPTIONS=--openssl-legacy-provider
      - DANGEROUSLY_DISABLE_HOST_CHECK=true
      - REACT_APP_API_URL=http://localhost:3001
    ports:
      - "3000:3000"
    depends_on:
      - api-gateway
    restart: on-failure

  api-gateway:
    build:
      context: ../services/api-gateway
      dockerfile: Dockerfile
    environment:
      - PORT=3001
      - NODE_ENV=development
      - AUTH_SERVICE_URL=http://auth-service:3001
      - SIMULATION_SERVICE_URL=http://simulation-service:3002
      - INTELLIGENCE_SERVICE_URL=http://intelligence-service:3003
      - ALERT_SERVICE_URL=http://alert-service:3004
      - NOTIFICATION_SERVICE_URL=http://notification-service:3005
    ports:
      - "3001:3001"
    depends_on:
      - auth-service
      - simulation-service
      - intelligence-service
      - alert-service
      - notification-service
    restart: on-failure

  auth-service:
    build:
      context: ../services/auth-service
      dockerfile: Dockerfile
    environment:
      - PORT=3001
      - MONGO_URI=mongodb://mongo:27017/auth
      - JWT_SECRET=dev-secret-change-in-prod
    ports:
      - "3101:3001"
    depends_on:
      - mongo
    restart: on-failure

  simulation-service:
    build:
      context: ../services/simulation-service
      dockerfile: Dockerfile
    environment:
      - PORT=3002
      - MONGO_URI=mongodb://mongo:27017/simulation
      - REDIS_URL=redis://redis:6379
    ports:
      - "3002:3002"
    depends_on:
      - mongo
      - redis
    restart: on-failure

  intelligence-service:
    build:
      context: ../services/intelligence-service
      dockerfile: Dockerfile
    environment:
      - PORT=3003
      - MONGO_URI=mongodb://mongo:27017/intelligence
      - REDIS_URL=redis://redis:6379
    ports:
      - "3003:3003"
    depends_on:
      - mongo
      - redis
    restart: on-failure

  alert-service:
    build:
      context: ../services/alert-service
      dockerfile: Dockerfile
    environment:
      - PORT=3004
      - MONGO_URI=mongodb://mongo:27017/alert
    ports:
      - "3004:3004"
    depends_on:
      - mongo
    restart: on-failure

  notification-service:
    build:
      context: ../services/notification-service
      dockerfile: Dockerfile
    environment:
      - PORT=3005
      - MONGO_URI=mongodb://mongo:27017/notification
      - SMTP_HOST=mailhog
      - SMTP_PORT=1025
    ports:
      - "3005:3005"
    depends_on:
      - mongo
      - mailhog
    restart: on-failure

  mongo:
    image: mongo:7
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data

  mailhog:
    image: mailhog/mailhog:v1.0.1
    restart: unless-stopped
    ports:
      - "8025:8025"

volumes:
  mongo-data:
  redis-data: